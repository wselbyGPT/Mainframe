services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host ${API_HOST:-0.0.0.0} --port ${API_PORT:-8000}
    env_file:
      - .env
    ports:
      - "8080:8000"
    volumes:
      - ./backend:/app
      - ./var:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m worker.main
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./var:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
